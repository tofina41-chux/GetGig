{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto py-12">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-gray-100">
        <h1 class="text-3xl font-black text-gray-900 mb-8">Post a New Gig</h1>

        <!-- Added enctype for image support -->
        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            
            {% for field in form %}
            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-700 ml-1">{{ field.label }}</label>
                
                {% if field.name == 'image' %}
                    <!-- Custom Styled File Input -->
                    <div class="relative group">
                        <div class="w-full h-32 border-2 border-dashed border-gray-200 rounded-2xl flex flex-col items-center justify-center group-hover:border-ocean transition bg-gray-50">
                            <svg class="w-8 h-8 text-gray-400 group-hover:text-ocean mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <span class="text-xs font-bold text-gray-500 uppercase tracking-wider">Click to upload project cover</span>
                            {{ field }}
                        </div>
                    </div>
                {% else %}
                    {{ field }}
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="w-full bg-ocean text-white py-5 rounded-2xl font-black text-lg shadow-lg hover:bg-blue-700 transition-all transform hover:-translate-y-1">
                Launch Project
            </button>
        </form>
    </div>
</div>

<style>
    /* Hides the ugly "No file chosen" text but keeps the button functional */
    input[type="file"] {
        @apply absolute inset-0 opacity-0 cursor-pointer !important;
    }
    input, textarea, select {
        @apply w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-ocean transition text-gray-700 !important;
    }
</style>
{% endblock %}
