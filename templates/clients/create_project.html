{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <h2 class="text-3xl font-bold mb-6 text-gray-800">Post a New Gig</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="flex space-x-4 pt-4">
            <button type="submit" class="flex-1 bg-[#0F52BA] text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
    Publish Project
</button>
            <a href="{% url 'projects:client_dashboard' %}" class="flex-1 text-center py-3 text-gray-500 hover:text-gray-800 font-semibold">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
