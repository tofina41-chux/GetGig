{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-100 mt-10">
    <h2 class="text-3xl font-bold text-center mb-6 text-gray-800">Welcome Back</h2>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-gray-700 mb-2">Username</label>
            <input type="text" name="username" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-ocean outline-none">
        </div>
        <div>
            <label class="block text-gray-700 mb-2">Password</label>
            <input type="password" name="password" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-ocean outline-none">
        </div>
        
        <button type="submit" class="w-full bg-[#0F52BA] hover:bg-blue-700 text-white mt-4 py-3 rounded-lg text-lg font-semibold transition shadow-md">
    Login to GetGig
</button>
    
    <div class="mt-6 text-center text-gray-500">
        <p>Don't have an account? <a href="{% url 'users:register' %}" class="text-mint font-bold hover:underline">Sign Up</a></p>
        <p class="mt-2 text-sm"><a href="{% url 'password_reset' %}" class="hover:text-ocean">Forgot password?</a></p>
    </div>
</div>
{% endblock %}
