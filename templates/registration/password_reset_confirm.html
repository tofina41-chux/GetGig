{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-12 bg-white p-8 rounded-xl shadow-sm border border-gray-100">
    <h2 class="text-2xl font-bold text-ocean mb-4">Set New Password</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary w-full">Update Password</button>
    </form>
</div>
{% endblock %}
