{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <h2 class="text-3xl font-bold text-center mb-6 text-gray-800">Create Account</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full btn-primary mt-4 py-3 text-lg">Join GetGig</button>
    </form>
    <p class="mt-6 text-center text-gray-500">
        Already have an account? <a href="{% url 'login' %}" class="text-ocean font-semibold">Login</a>
    </p>
</div>
{% endblock %}
